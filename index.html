function modalEditarEmpresa(id){ modalNovaEmpresa(id); }

function salvarEmpresa(id){
  const razao = el('e-razao').value.trim();
  if(!razao){ alert('Razão Social é obrigatória.'); return; }
  const dados = {
    razaoSocial: razao,
    nomeFantasia: el('e-fantasia').value.trim(),
    cnpj: el('e-cnpj').value.trim(),
    setor: el('e-setor').value.trim(),
    responsavel: el('e-resp').value.trim(),
    cargo: el('e-cargo').value.trim(),
    email: el('e-email').value.trim(),
    telefone: el('e-tel').value.trim(),
    stand: el('e-stand').value.trim(),
    status: el('e-status').value,
    obs: el('e-obs').value.trim(),
  };
  if(id){ DB.update('empresas',id,dados); }
  else { DB.add('empresas',dados); }
  fecharModal();
  paginaEmpresas(el('conteudo'));
}

function excluirEmpresa(id){
  if(!confirm('Excluir esta empresa?')) return;
  DB.remove('empresas',id);
  paginaEmpresas(el('conteudo'));
}

function fecharModal(){ el('modal-host').innerHTML=''; }
</script>
<script>
// ============================================================
// CONTRATOS
// ============================================================
function paginaContratos(c){
  const emps = DB.get('empresas');
  const contratos = DB.get('contratos');
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  function statusC(ct){
    if(ct.status==='cancelado') return {txt:'Cancelado',cls:'inativo'};
    if(ct.status==='assinado')  return {txt:'Assinado', cls:'ativo'};
    if(ct.dataVencimento){
      const v=new Date(ct.dataVencimento+'T00:00:00');
      if(v<hoje) return {txt:'Vencido',cls:'inativo'};
    }
    return {txt:'Pendente',cls:'pend'};
  }

  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Contratos</div><div class="pag-sub">${contratos.length} contrato(s) cadastrado(s)</div></div>
      <button class="btn" onclick="modalNovoContrato()"><i class="fa-solid fa-plus"></i> Novo contrato</button>
    </div>
    <div class="search-bar">
      <input type="text" id="filtro-ct" placeholder="Buscar por empresa ou número..." oninput="filtrarContratos()">
      <select id="filtro-ct-status" onchange="filtrarContratos()" style="padding:9px 14px;border:1.5px solid #e5e1f5;border-radius:10px;font-size:13.5px;background:#fdfcff;font-family:'Inter',sans-serif;color:#1f2937">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="assinado">Assinado</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div id="lista-contratos">${renderContratos(contratos, emps)}</div>
  `;
}

function renderContratos(contratos, emps){
  if(!emps) emps = DB.get('empresas');
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  if(contratos.length===0) return '<div class="card"><div class="vazio">Nenhum contrato cadastrado. Clique em <b>+ Novo contrato</b> para começar.</div></div>';

  function statusC(ct){
    if(ct.status==='cancelado') return {txt:'Cancelado',cls:'inativo'};
    if(ct.status==='assinado')  return {txt:'Assinado', cls:'ativo'};
    if(ct.dataVencimento){
      const v=new Date(ct.dataVencimento+'T00:00:00');
      if(v<hoje) return {txt:'Vencido',cls:'inativo'};
    }
    return {txt:'Pendente',cls:'pend'};
  }

  return contratos.map(ct=>{
    const emp = emps.find(e=>e.id===ct.empresaId);
    const st = statusC(ct);
    return `
      <div class="contrato-card">
        <div class="contrato-header">
          <div>
            <div class="contrato-empresa">${emp?emp.nomeFantasia||emp.razaoSocial:'Empresa não vinculada'}</div>
            <div class="contrato-meta">Nº ${ct.numero||'—'} · Valor: ${ct.valor?'R$ '+ct.valor:'—'} · Venc.: ${ct.dataVencimento?fmtData(ct.dataVencimento):'—'}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="pill ${st.cls}">${st.txt}</span>
            <button class="btn-outline btn-sm" onclick="modalEditarContrato('${ct.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-perigo btn-sm" onclick="excluirContrato('${ct.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
        <div class="contrato-tags">
          ${ct.tipoServico?'<span class="pill azul">'+ct.tipoServico+'</span>':''}
          ${ct.stand?'<span class="pill pend">Stand '+ct.stand+'</span>':''}
          ${ct.area?'<span class="pill pend">'+ct.area+'m²</span>':''}
        </div>
        ${ct.obs?'<div style="font-size:12px;color:#6b7280;margin-top:8px;background:#f5f3ff;padding:6px 10px;border-radius:8px">'+ct.obs+'</div>':''}
      </div>
    `;
  }).join('');
}

function filtrarContratos(){
  const q = (el('filtro-ct')||{}).value||'';
  const st = (el('filtro-ct-status')||{}).value||'';
  const emps = DB.get('empresas');
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  let cts = DB.get('contratos');
  if(q) cts = cts.filter(c=>{
    const emp = emps.find(e=>e.id===c.empresaId);
    return ((emp?emp.nomeFantasia+emp.razaoSocial:'')+c.numero).toLowerCase().includes(q.toLowerCase());
  });
  if(st) cts = cts.filter(c=>c.status===st);
  const lista = el('lista-contratos');
  if(lista) lista.innerHTML = renderContratos(cts, emps);
}

function modalNovoContrato(id){
  const ct = id ? DB.find('contratos',id) : null;
  const emps = DB.get('empresas');
  const titulo = ct ? 'Editar Contrato' : 'Novo Contrato';
  el('modal-host').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <h3><i class="fa-solid fa-file-contract"></i> ${titulo}</h3>
        <div class="secao-tit">Identificação</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Contrato</label><input id="ct-num" value="${ct?ct.numero||'':''}"></div>
          <div class="campo"><label>Empresa *</label>
            <select id="ct-emp">
              <option value="">Selecione...</option>
              ${emps.map(e=>`<option value="${e.id}" ${ct&&ct.empresaId===e.id?'selected':''}>${e.nomeFantasia||e.razaoSocial}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>Tipo de serviço</label><input id="ct-tipo" placeholder="Ex: Estande Padrão" value="${ct?ct.tipoServico||'':''}"></div>
          <div class="campo"><label>Status</label>
            <select id="ct-status">
              <option value="pendente" ${(!ct||ct.status==='pendente')?'selected':''}>Pendente</option>
              <option value="assinado" ${ct&&ct.status==='assinado'?'selected':''}>Assinado</option>
              <option value="cancelado" ${ct&&ct.status==='cancelado'?'selected':''}>Cancelado</option>
            </select>
          </div>
        </div>
        <div class="secao-tit">Valores e prazo</div>
        <div class="grid-2">
          <div class="campo"><label>Valor (R$)</label><input id="ct-valor" type="text" placeholder="0,00" value="${ct?ct.valor||'':''}"></div>
          <div class="campo"><label>Data de vencimento</label><input id="ct-venc" type="date" value="${ct?ct.dataVencimento||'':''}"></div>
        </div>
        <div class="secao-tit">Estande</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Stand</label><input id="ct-stand" value="${ct?ct.stand||'':''}"></div>
          <div class="campo"><label>Área (m²)</label><input id="ct-area" type="number" placeholder="0" value="${ct?ct.area||'':''}"></div>
        </div>
        <div class="campo"><label>Observações</label><textarea id="ct-obs" rows="3">${ct?ct.obs||'':''}</textarea></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarContrato('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
  `;
}

function modalEditarContrato(id){ modalNovoContrato(id); }

function salvarContrato(id){
  const empId = el('ct-emp').value;
  if(!empId){ alert('Selecione a empresa.'); return; }
  const dados = {
    empresaId: empId,
    numero: el('ct-num').value.trim(),
    tipoServico: el('ct-tipo').value.trim(),
    status: el('ct-status').value,
    valor: el('ct-valor').value.trim(),
    dataVencimento: el('ct-venc').value,
    stand: el('ct-stand').value.trim(),
    area: el('ct-area').value.trim(),
    obs: el('ct-obs').value.trim(),
  };
  if(id){ DB.update('contratos',id,dados); }
  else { DB.add('contratos',dados); }
  fecharModal();
  paginaContratos(el('conteudo'));
}

function excluirContrato(id){
  if(!confirm('Excluir este contrato?')) return;
  DB.remove('contratos',id);
  paginaContratos(el('conteudo'));
}
</script>
<script>
// ============================================================
// AGENDA COM NOTIFICAÇÕES
// ============================================================
let _agendaMes = new Date().getMonth();
let _agendaAno = new Date().getFullYear();

function paginaAgenda(c){
  solicitarPermissaoNotificacao();
  renderAgenda(c);
}

function solicitarPermissaoNotificacao(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function renderAgenda(c){
  const hoje = new Date().toISOString().split('T')[0];
  const eventos = DB.get('agenda').sort((a,b)=>a.data>b.data?1:-1);
  const nomeMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][_agendaMes];
  
  // Build calendar
  const primeiroDia = new Date(_agendaAno, _agendaMes, 1);
  const ultimoDia   = new Date(_agendaAno, _agendaMes+1, 0);
  const diasNoMes   = ultimoDia.getDate();
  const inicioSemana = primeiroDia.getDay(); // 0=dom

  let calHtml = '<div class="agenda-cal">';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{
    calHtml += `<div class="cal-dia-nome">${d}</div>`;
  });
  
  for(let i=0;i<inicioSemana;i++) calHtml += '<div></div>';
  
  for(let d=1;d<=diasNoMes;d++){
    const dateStr = `${_agendaAno}-${String(_agendaMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evsDia = eventos.filter(e=>e.data===dateStr);
    const isHoje = dateStr===hoje;
    calHtml += `<div class="cal-dia${isHoje?' hoje':''}" onclick="modalNovoEvento(null,'${dateStr}')">
      <div class="dia-num">${d}</div>
      ${evsDia.slice(0,2).map(e=>`<div class="cal-evento ${e.cor||''}" title="${e.titulo}">${e.titulo}</div>`).join('')}
      ${evsDia.length>2?`<div style="font-size:9px;color:#6b7280">+${evsDia.length-2}</div>`:''}
    </div>`;
  }
  calHtml += '</div>';

  // Events list
  const evFuturos = eventos.filter(e=>e.data>=hoje);
  const evPassados = eventos.filter(e=>e.data<hoje);

  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Agenda</div><div class="pag-sub">${eventos.length} evento(s) cadastrado(s)</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" onclick="notificarEventosHoje()"><i class="fa-solid fa-bell"></i> Notificar hoje</button>
        <button class="btn" onclick="modalNovoEvento()"><i class="fa-solid fa-plus"></i> Novo evento</button>
      </div>
    </div>

    ${'Notification' in window && Notification.permission!=='granted' && Notification.permission!=='denied'
      ? '<div class="alerta info"><i class="fa-solid fa-bell"></i> Ative as notificações para receber lembretes de eventos.</div>'
      : ''}
    ${Notification.permission==='denied'
      ? '<div class="alerta erro"><i class="fa-solid fa-bell-slash"></i> Notificações bloqueadas. Ative nas configurações do navegador.</div>'
      : ''}
    ${Notification.permission==='granted'
      ? '<div class="alerta ok"><i class="fa-solid fa-bell"></i> Notificações ativadas! Você receberá lembretes dos eventos.</div>'
      : ''}

    <div class="card">
      <div class="cal-nav">
        <button class="btn-outline btn-sm" onclick="mudMes(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <h4>${nomeMes} ${_agendaAno}</h4>
        <button class="btn-outline btn-sm" onclick="mudMes(1)"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      ${calHtml}
    </div>

    <div class="card">
      <div class="secao-tit">Próximos eventos (${evFuturos.length})</div>
      ${evFuturos.length===0
        ? '<div class="vazio">Nenhum evento futuro.</div>'
        : '<div class="lista-eventos">' + evFuturos.map(e=>renderEvento(e)).join('') + '</div>'
      }
    </div>

    ${evPassados.length>0?`
      <details style="margin-top:8px">
        <summary style="cursor:pointer;font-size:13px;color:#6b7280;padding:8px 0">Eventos passados (${evPassados.length})</summary>
        <div class="card" style="margin-top:8px">
          <div class="lista-eventos">
            ${evPassados.reverse().map(e=>renderEvento(e,true)).join('')}
          </div>
        </div>
      </details>
    `:''}
  `;
}

function renderEvento(e, passado=false){
  return `
    <div class="evento-item ${passado?'concluido':''}">

function mudMes(dir){
  _agendaMes += dir;

}

          <div class="campo"><label>Horário</label><input id="ev-hora" type="time" value="${ev?ev.hora||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>Tipo</label>
            <select id="ev-tipo">
              <option value="">Selecione...</option>
              ${['Reunião','Prazo','Entrega','Instalação','Visita','Evento','Outro'].map(t=>`<option value="${t}" ${ev&&ev.tipo===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="campo"><label>Cor</label>
            <select id="ev-cor">
              <option value="" ${!ev||!ev.cor?'selected':''}>Roxo (padrão)</option>
              <option value="vermelho" ${ev&&ev.cor==='vermelho'?'selected':''}>Vermelho (urgente)</option>
              <option value="verde" ${ev&&ev.cor==='verde'?'selected':''}>Verde (concluído)</option>
              <option value="amarelo" ${ev&&ev.cor==='amarelo'?'selected':''}>Amarelo (atenção)</option>
            </select>
          </div>
        </div>
        <div class="campo"><label>Local</label><input id="ev-local" placeholder="Sala, Pavilhão..." value="${ev?ev.local||'':''}"></div>
        <div class="campo"><label>Descrição / Observações</label><textarea id="ev-desc" rows="3">${ev?ev.desc||'':''}</textarea></div>
        <div class="campo" style="background:#f5f3ff;padding:12px;border-radius:10px">
          <label><i class="fa-solid fa-bell"></i> Lembrete (minutos antes)</label>
          <select id="ev-lembrete">
            <option value="">Sem lembrete</option>
            <option value="5" ${ev&&ev.lembrete==='5'?'selected':''}>5 minutos</option>
            <option value="15" ${ev&&ev.lembrete==='15'?'selected':''}>15 minutos</option>
            <option value="30" ${ev&&ev.lembrete==='30'?'selected':''}>30 minutos</option>
            <option value="60" ${ev&&ev.lembrete==='60'?'selected':''}>1 hora</option>
            <option value="1440" ${ev&&ev.lembrete==='1440'?'selected':''}>1 dia antes</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarEvento('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
  `;
}

function salvarEvento(id){
  const titulo = el('ev-tit').value.trim();
  const data   = el('ev-data').value;
  if(!titulo||!data){ alert('Título e data são obrigatórios.'); return; }
  const dados = {
    titulo, data,
    hora: el('ev-hora').value,
    tipo: el('ev-tipo').value,
    cor: el('ev-cor').value,
    local: el('ev-local').value.trim(),
    desc: el('ev-desc').value.trim(),
    lembrete: el('ev-lembrete').value,
  };
  if(id){ DB.update('agenda',id,dados); }
  else { DB.add('agenda',dados); }
  fecharModal();
  renderAgenda(el('conteudo'));
}

function excluirEvento(id){
  if(!confirm('Excluir este evento?')) return;
  DB.remove('agenda',id);
  renderAgenda(el('conteudo'));
}

// NOTIFICAÇÕES
function agendarNotificacoes(){
  // Check every minute for events needing notification
  setInterval(verificarLembretes, 60000);
  verificarLembretes();
}

function verificarLembretes(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const agora = new Date();
  const eventos = DB.get('agenda');
  eventos.forEach(ev=>{
    if(!ev.data||!ev.hora||!ev.lembrete) return;
    const evDate = new Date(ev.data+'T'+ev.hora);
    const diff = (evDate - agora) / 60000; // diff in minutes
    const lem  = parseInt(ev.lembrete);
    if(diff>0 && diff<=lem+1 && diff>=lem-1){
      const notifKey = 'notif_'+ev.id+'_'+ev.lembrete;
      if(!sessionStorage.getItem(notifKey)){
        sessionStorage.setItem(notifKey,'1');
        new Notification('📅 Lembrete: ' + ev.titulo, {
          body: fmtData(ev.data) + (ev.hora?' às '+ev.hora:'') + (ev.local?' — '+ev.local:''),
          icon: 'https://danielmaullins.github.io/terminalinovacao/icon.png',
        });
      }
    }
  });
}

function notificarEventosHoje(){
  if(!('Notification' in window)){ alert('Notificações não suportadas.'); return; }
  if(Notification.permission==='denied'){ alert('Notificações bloqueadas. Ative nas configurações do navegador.'); return; }
  Notification.requestPermission().then(p=>{
    if(p!=='granted') return;
    const hoje = new Date().toISOString().split('T')[0];
    const evHoje = DB.get('agenda').filter(e=>e.data===hoje);
    if(evHoje.length===0){
      new Notification('📅 Terminal Inovação', {body:'Nenhum evento para hoje.'});
    } else {
      evHoje.forEach(ev=>{
        new Notification('📅 Hoje: ' + ev.titulo, {
          body: (ev.hora?'às '+ev.hora:'') + (ev.local?' — '+ev.local:'') + (ev.desc?' | '+ev.desc:''),
        });
      });
    }
  });
}

function toggleCheck(col,id){

// ============================================================
// HELPERS
// ============================================================
function fmtData(iso){
  if(!iso) return '—';
  try{
    const d = iso.includes('T') ? new Date(iso) : new Date(iso+'T00:00:00');
    return d.toLocaleDateString('pt-BR');
  }catch(e){ return iso; }
}

function fmtDataHora(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString('pt-BR'); }
  catch(e){ return iso; }
}
