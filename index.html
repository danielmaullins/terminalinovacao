<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Intermodal 2027 — Terminal Inovação | Gestão de Expositores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
  :root{
    --roxo-900:#2e1065;--roxo-800:#4c1d95;--roxo-700:#5b21b6;--roxo-600:#6d28d9;
    --roxo-500:#7c3aed;--roxo-400:#8b5cf6;--roxo-300:#a78bfa;--roxo-100:#ede9fe;--roxo-50:#f5f3ff;
    --cinza-900:#1f2937;--cinza-700:#374151;--cinza-500:#6b7280;--cinza-300:#d1d5db;--cinza-100:#f3f4f6;
    --verde:#16a34a;--verde-bg:#dcfce7;--amarelo:#ca8a04;--amarelo-bg:#fef9c3;--vermelho:#dc2626;--vermelho-bg:#fee2e2;
    --branco:#ffffff;--sombra:0 4px 24px rgba(76,29,149,.10),0 1px 4px rgba(76,29,149,.06);
    --sombra-hover:0 8px 32px rgba(76,29,149,.18),0 2px 8px rgba(76,29,149,.1);--raio:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;letter-spacing:-0.01em;background:#f7f4fe;color:#1f2937;min-height:100vh;}
  a{color:#6d28d9;text-decoration:none}
  button{font-family:'Inter',system-ui,sans-serif;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;transition:.2s;letter-spacing:-0.01em}
  .btn{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;padding:10px 20px;box-shadow:0 4px 12px rgba(109,40,217,.3)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(109,40,217,.4)}
  .btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);padding:8px 16px}
  .btn-ghost:hover{background:rgba(255,255,255,.15)}
  .btn-sm{padding:6px 14px;font-size:13px}
  .btn-outline{background:transparent;color:#6d28d9;border:1.5px solid #6d28d9;padding:8px 16px}
  .btn-outline:hover{background:#f5f3ff}
  .btn-perigo{background:#dc2626;color:#fff;padding:8px 16px}
  .btn-perigo:hover{background:#b91c1c}
  /* TOPO */
  .topo{background:linear-gradient(135deg,#3a0f8a 0%,#6d28d9 60%,#7c3aed 100%);color:#fff;padding:0 28px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(46,16,101,.3)}
  .topo img{height:36px;filter:brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,.2));opacity:.9}
  .topo h2{font-size:17px;font-weight:700;letter-spacing:-0.02em}
  .topo .sub{font-size:11px;opacity:.75;letter-spacing:0.1px}
  .topo .spacer{flex:1}
  .topo .user{font-size:13px;text-align:right}
  .topo .user b{display:block}
  .topo .badge{display:inline-block;font-size:10.5px;font-weight:500;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:2px 9px;border-radius:20px;margin-top:2px}
  .topo .mark{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;border:1.5px solid rgba(255,255,255,.3);backdrop-filter:blur(4px)}
  /* LAYOUT */
  .layout{display:flex;max-width:1280px;margin:0 auto;gap:20px;padding:24px 28px}
  /* MENU */
  .menu{width:230px;flex-shrink:0;background:#fff;border-radius:16px;padding:12px 10px;box-shadow:var(--sombra);height:fit-content;border:1px solid rgba(139,92,246,.07);position:sticky;top:80px}
  .menu button{width:100%;text-align:left;background:transparent;color:#374151;padding:11px 14px;border-radius:12px;display:flex;align-items:center;gap:10px;margin-bottom:2px;font-weight:500;font-size:13.5px;letter-spacing:-0.01em}
  .menu button:hover{background:#f5f3ff;color:#5b21b6}
  .menu button.ativo{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;box-shadow:0 4px 12px rgba(109,40,217,.35)}
  .menu .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
  /* CONTEUDO */
  #conteudo{flex:1;min-width:0}
  .card{background:#fff;border-radius:var(--raio);padding:22px;box-shadow:var(--sombra);margin-bottom:16px;border:1px solid rgba(139,92,246,.06)}
  .card:hover{box-shadow:var(--sombra-hover)}
  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:#fff;border-radius:var(--raio);padding:18px 20px;box-shadow:var(--sombra);border-top:3px solid #8b5cf6;cursor:default;transition:.2s}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--sombra-hover)}
  .stat .n{font-size:28px;font-weight:800;color:#5b21b6;letter-spacing:-0.03em}
  .stat .l{font-size:11px;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  /* TOOLBAR */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .pag-titulo{font-size:20px;font-weight:800;color:#2e1065;letter-spacing:-0.02em}
  .pag-sub{font-size:13px;color:#6b7280;margin-top:2px}
  .vazio{text-align:center;color:#6b7280;padding:40px 20px;font-size:14px}
  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(46,16,101,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:28px}
  .modal h3{color:#4c1d95;margin-bottom:18px;font-size:18px;font-weight:700}
  /* FORMS */
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
  .campo input,.campo select,.campo textarea{width:100%;padding:10px 13px;border:1.5px solid #e5e1f5;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:#fdfcff;transition:.2s;color:#1f2937}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
  .campo textarea{resize:vertical;min-height:80px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  /* PILLS */
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.pend{background:#fef9c3;color:#ca8a04}
  .pill.ativo{background:#dcfce7;color:#16a34a}
  .pill.inativo{background:#fee2e2;color:#dc2626}
  .pill.azul{background:#dbeafe;color:#1d4ed8}
  /* TABELA */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:2px solid #ede9fe}
  td{padding:12px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
  tr:hover td{background:#f5f3ff}
  /* ALERTA */
  .alerta{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;font-weight:600}
  .alerta.erro{background:#fee2e2;color:#dc2626}
  .alerta.ok{background:#dcfce7;color:#16a34a}
  .alerta.info{background:#ede9fe;color:#5b21b6}
  /* SECOES */
  .secao-tit{font-size:12px;font-weight:800;color:#6d28d9;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;border-bottom:2px solid #ede9fe;padding-bottom:6px}
  /* AGENDA */
  .agenda-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
  .cal-dia-nome{text-align:center;font-size:11px;font-weight:700;color:#6b7280;padding:6px 0;text-transform:uppercase}
  .cal-dia{min-height:80px;border-radius:10px;background:#f5f3ff;padding:6px;cursor:pointer;transition:.15s;border:2px solid transparent;font-size:12px}
  .cal-dia:hover{background:#ede9fe;border-color:#c4b5fd}
  .cal-dia.hoje{border-color:#7c3aed;background:#ede9fe}
  .cal-dia.outro-mes{opacity:.4}
  .cal-dia .dia-num{font-weight:700;font-size:13px;color:#374151;margin-bottom:2px}
  .cal-dia.hoje .dia-num{color:#5b21b6}
  .cal-evento{font-size:10px;background:#7c3aed;color:#fff;border-radius:4px;padding:1px 5px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .cal-evento.vermelho{background:#dc2626}
  .cal-evento.verde{background:#16a34a}
  .cal-evento.amarelo{background:#ca8a04}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-nav h4{font-size:16px;font-weight:700;color:#2e1065}
  .lista-eventos{display:flex;flex-direction:column;gap:10px}
  .evento-item{display:flex;gap:12px;align-items:flex-start;background:#f5f3ff;border-radius:10px;padding:12px 14px;border-left:4px solid #7c3aed}
  .evento-item.urgente{border-left-color:#dc2626;background:#fff5f5}
  .evento-item.concluido{border-left-color:#16a34a;background:#f0fdf4;opacity:.7}
  .evento-data{font-size:11px;font-weight:700;color:#6b7280;white-space:nowrap;min-width:80px}
  .evento-titulo{font-size:14px;font-weight:600;color:#1f2937}
  .evento-desc{font-size:12px;color:#6b7280;margin-top:2px}
  .evento-acoes{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
  /* CONTRATOS */
  .contrato-card{background:#fff;border-radius:12px;border:1px solid #ede9fe;padding:16px;margin-bottom:12px;transition:.2s}
  .contrato-card:hover{box-shadow:var(--sombra-hover)}
  .contrato-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .contrato-empresa{font-size:15px;font-weight:700;color:#2e1065}
  .contrato-meta{font-size:12px;color:#6b7280;margin-top:2px}
  .contrato-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  /* LOGIN */
  .login-wrap{min-height:100vh;background:linear-gradient(135deg,#3a0f8a,#6d28d9 50%,#7c3aed);display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:#fff;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(46,16,101,.3)}
  .login-logo{text-align:center;margin-bottom:24px}
  .login-logo .mark{width:56px;height:56px;background:linear-gradient(135deg,#6d28d9,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(109,40,217,.35);color:#fff;font-size:24px}
  .login-logo h1{font-size:17px;font-weight:800;color:#2e1065;letter-spacing:-0.02em}
  .login-logo p{font-size:12px;color:#6b7280;margin-top:3px}
  .tab-bar{display:flex;background:#f5f3ff;border-radius:10px;padding:3px;margin-bottom:20px;gap:3px}
  .tab-btn{flex:1;background:transparent;color:#6b7280;padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none}
  .tab-btn.ativo{background:#fff;color:#5b21b6;box-shadow:0 2px 8px rgba(109,40,217,.12)}
  #msg-login{margin-bottom:12px}
  /* CHECKLIST */
  .check-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;transition:.15s;cursor:pointer}
  .check-item:hover{background:#f5f3ff}
  .check-item input[type=checkbox]{width:18px;height:18px;accent-color:#6d28d9;cursor:pointer}
  .check-item.done span{text-decoration:line-through;color:#6b7280}
  /* SEARCH BAR */
  .search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search-bar input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid #e5e1f5;border-radius:10px;font-size:13.5px;background:#fdfcff;font-family:'Inter',sans-serif}
  .search-bar input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
  /* NOTIF BADGE */
  .notif-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:#dc2626;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:0 5px;margin-left:4px}
  </style>
</head>
<body>
<!-- LOGIN -->
<div id="tela-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="mark"><i class="fa-solid fa-train-subway"></i></div>
      <h1>Terminal Inovação</h1>
      <p>Intermodal 2027 — Gestão de Expositores</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ativo" id="tab-entrar" onclick="trocarTab('entrar')">Entrar</button>
      <button class="tab-btn" id="tab-criar" onclick="trocarTab('criar')">Criar conta</button>
    </div>
    <div id="msg-login"></div>
    <form id="form-entrar" onsubmit="entrar(event)">
      <div class="campo"><label>E-mail</label><input id="login-email" type="email" placeholder="seu@email.com" required></div>
      <div class="campo"><label>Senha</label><input id="login-senha" type="password" placeholder="••••••••" required></div>
      <button class="btn" style="width:100%;margin-top:8px;padding:12px" type="submit">Entrar</button>
      <p style="text-align:center;margin-top:12px;font-size:13px;color:#6b7280"><a href="#" onclick="recuperarSenha(event)">Esqueceu a senha?</a></p>
    </form>
    <form id="form-criar" style="display:none" onsubmit="criarConta(event)">
      <div class="campo"><label>Nome completo</label><input id="novo-nome" type="text" placeholder="Nome completo" required></div>
      <div class="campo"><label>E-mail</label><input id="novo-email" type="email" placeholder="seu@email.com" required></div>
      <div class="campo"><label>Senha</label><input id="novo-senha" type="password" placeholder="••••••••" minlength="6" required></div>
      <button class="btn" style="width:100%;margin-top:8px;padding:12px" type="submit">Criar conta</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="topo">
    <div class="mark"><i class="fa-solid fa-train-subway"></i></div>
    <div>
      <div class="topo h2" style="font-size:17px;font-weight:700;letter-spacing:-0.02em">Terminal Inovação</div>
      <div class="sub">Intermodal 2027</div>
    </div>
    <div class="spacer"></div>
    <div class="user"><b id="u-nome">—</b><span class="badge" id="u-papel">—</span></div>
    <button class="btn-ghost btn-sm" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
  </header>
  <div class="layout">
    <nav class="menu" id="menu"></nav>
    <main id="conteudo"></main>
  </div>
</div>
<div id="modal-host"></div>

<script>
// ============================================================
// STORAGE HELPERS
// ============================================================
const DB = {
  get(col){ try{ return JSON.parse(localStorage.getItem('ti_'+col)||'[]'); }catch(e){return[];} },
  set(col,data){ localStorage.setItem('ti_'+col, JSON.stringify(data)); },
  add(col,item){ const d=DB.get(col); item.id=item.id||Date.now().toString(36)+Math.random().toString(36).slice(2); item.criadoEm=new Date().toISOString(); d.push(item); DB.set(col,d); return item; },
  update(col,id,patch){ const d=DB.get(col); const i=d.findIndex(x=>x.id===id); if(i>=0){d[i]={...d[i],...patch,atualizadoEm:new Date().toISOString()};DB.set(col,d);return d[i];} return null; },
  remove(col,id){ DB.set(col, DB.get(col).filter(x=>x.id!==id)); },
  find(col,id){ return DB.get(col).find(x=>x.id===id)||null; }
};

// ============================================================
// AUTH (localStorage-based)
// ============================================================
const USUARIOS_KEY = 'ti_usuarios';
const SESSAO_KEY   = 'ti_sessao';
let USER = null;
let PAGINA = 'dash';

function getUsuarios(){ try{return JSON.parse(localStorage.getItem(USUARIOS_KEY)||'[]');}catch(e){return[];} }
function salvarUsuarios(u){ localStorage.setItem(USUARIOS_KEY, JSON.stringify(u)); }

function iniciarApp(){
  const sess = localStorage.getItem(SESSAO_KEY);
  if(sess){
    try{
      USER = JSON.parse(sess);
      mostrarApp();
    }catch(e){ mostrarLogin(); }
  } else {
    mostrarLogin();
  }
  agendarNotificacoes();
}

function mostrarLogin(){
  document.getElementById('tela-login').style.display='flex';
  document.getElementById('app').style.display='none';
}
function mostrarApp(){
  document.getElementById('tela-login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('u-nome').textContent = USER.nome;
  document.getElementById('u-papel').textContent = USER.papel==='admin' ? 'Organização (Admin)' : 'Expositor';
  montarMenu();
  render();
}

function trocarTab(t){
  document.getElementById('form-entrar').style.display = t==='entrar'?'block':'none';
  document.getElementById('form-criar').style.display  = t==='criar'?'block':'none';
  document.getElementById('tab-entrar').classList.toggle('ativo',t==='entrar');
  document.getElementById('tab-criar').classList.toggle('ativo',t==='criar');
  document.getElementById('msg-login').innerHTML='';
}

function entrar(e){
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const senha  = document.getElementById('login-senha').value;
  const users  = getUsuarios();
  let u = users.find(x=>x.email===email && x.senha===senha);
  // Auto-create admin if first login
  if(!u && email && senha.length>=6){
    const isFirst = users.length===0;
    if(isFirst){
      u = {id:'adm1',nome:'Administrador',email,senha,papel:'admin',criadoEm:new Date().toISOString()};
      users.push(u); salvarUsuarios(users);
    }
  }
  if(!u){ msgLogin('E-mail ou senha inválidos.','erro'); return; }
  USER = u;
  localStorage.setItem(SESSAO_KEY, JSON.stringify(u));
  mostrarApp();
}

function criarConta(e){
  e.preventDefault();
  const nome  = document.getElementById('novo-nome').value.trim();
  const email = document.getElementById('novo-email').value.trim().toLowerCase();
  const senha = document.getElementById('novo-senha').value;
  const users = getUsuarios();
  if(users.find(x=>x.email===email)){ msgLogin('Este e-mail já está cadastrado.','erro'); return; }
  const u = {id:Date.now().toString(36),nome,email,senha,papel:'expositor',criadoEm:new Date().toISOString()};
  users.push(u); salvarUsuarios(users);
  USER = u;
  localStorage.setItem(SESSAO_KEY, JSON.stringify(u));
  mostrarApp();
}

function sair(){
  localStorage.removeItem(SESSAO_KEY);
  USER = null;
  mostrarLogin();
}

function recuperarSenha(e){
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  if(!email){ msgLogin('Digite seu e-mail no campo acima.','info'); return; }
  const users = getUsuarios();
  const u = users.find(x=>x.email===email);
  if(u){ msgLogin('Sua senha é: ' + u.senha,'ok'); }
  else { msgLogin('E-mail não encontrado.','erro'); }
}

function msgLogin(txt,tipo){
  document.getElementById('msg-login').innerHTML = `<div class="alerta ${tipo}">${txt}</div>`;
}

// ============================================================
// MENU
// ============================================================
function montarMenu(){
  const itens = USER.papel==='admin' ? [
    {id:'dash',       ico:'<i class="fa-solid fa-chart-pie"></i>',       txt:'Painel geral'},
    {id:'empresas',   ico:'<i class="fa-solid fa-building"></i>',         txt:'Empresas'},
    {id:'contratos',  ico:'<i class="fa-solid fa-file-contract"></i>',    txt:'Contratos'},
    {id:'agenda',     ico:'<i class="fa-solid fa-calendar-days"></i>',    txt:'Agenda'},
    {id:'avisos',     ico:'<i class="fa-solid fa-bell"></i>',             txt:'Avisos'},
    {id:'divulgacao', ico:'<i class="fa-solid fa-bullhorn"></i>',         txt:'Divulgação'},
    {id:'usuarios',   ico:'<i class="fa-solid fa-users"></i>',            txt:'Usuários & convites'},
    {id:'checklist-admin',ico:'<i class="fa-solid fa-list-check"></i>',  txt:'Checklists'},
  ] : [
    {id:'minha-empresa',ico:'<i class="fa-solid fa-building"></i>',       txt:'Minha empresa'},
    {id:'meu-contrato', ico:'<i class="fa-solid fa-file-contract"></i>',  txt:'Meu contrato'},
    {id:'agenda',        ico:'<i class="fa-solid fa-calendar-days"></i>', txt:'Agenda'},
    {id:'avisos',        ico:'<i class="fa-solid fa-bell"></i>',          txt:'Avisos'},
    {id:'checklist',     ico:'<i class="fa-solid fa-list-check"></i>',    txt:'Checklist'},
  ];
  const nav = document.getElementById('menu');
  nav.innerHTML = itens.map(it=>`
    <button data-p="${it.id}" onclick="ir('${it.id}')" class="${PAGINA===it.id?'ativo':''}">
      <span class="ico">${it.ico}</span>${it.txt}
    </button>
  `).join('');
}

function ir(pag){
  PAGINA = pag;
  montarMenu();
  render();
}

function el(id){ return document.getElementById(id); }

// ============================================================
// RENDER
// ============================================================
function render(){
  const c = el('conteudo');
  c.innerHTML = '<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando…</div>';
  if(PAGINA==='dash')            return paginaDash(c);
  if(PAGINA==='empresas')        return paginaEmpresas(c);
  if(PAGINA==='contratos')       return paginaContratos(c);
  if(PAGINA==='agenda')          return paginaAgenda(c);
  if(PAGINA==='avisos')          return paginaAvisos(c);
  if(PAGINA==='divulgacao')      return paginaDivulgacao(c);
  if(PAGINA==='usuarios')        return paginaUsuarios(c);
  if(PAGINA==='checklist-admin') return paginaChecklist(c,'admin');
  if(PAGINA==='minha-empresa')   return paginaMinhaEmpresa(c);
  if(PAGINA==='meu-contrato')    return paginaMeuContrato(c);
  if(PAGINA==='checklist')       return paginaChecklist(c,'exp');
  c.innerHTML = '<div class="vazio">Página em construção.</div>';
}
</script>
<script>
// ============================================================
// PAINEL GERAL
// ============================================================
function paginaDash(c){
  const emps = DB.get('empresas');
  const contratos = DB.get('contratos');
  const eventos = DB.get('agenda');
  const hoje = new Date().toISOString().split('T')[0];
  const evHoje = eventos.filter(e=>e.data===hoje).length;
  const contAtivos = contratos.filter(c=>c.status==='assinado').length;
  c.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="n">${emps.length}</div><div class="l">Empresas</div></div>
      <div class="stat"><div class="n">${contratos.length}</div><div class="l">Contratos</div></div>
      <div class="stat"><div class="n">${contAtivos}</div><div class="l">Assinados</div></div>
      <div class="stat"><div class="n">${evHoje}</div><div class="l">Eventos hoje</div></div>
    </div>
    <div class="card">
      <div class="secao-tit">Últimas empresas cadastradas</div>
      ${emps.length===0
        ? '<div class="vazio">Nenhuma empresa cadastrada ainda.</div>'
        : emps.slice(-5).reverse().map(e=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6">
            <div><b style="color:#2e1065">${e.nomeFantasia||e.razaoSocial}</b><br><small style="color:#6b7280">${e.cnpj||''} · ${e.setor||''}</small></div>
            <span class="pill ${e.status==='ativo'?'ativo':'pend'}">${e.status||'pendente'}</span>
          </div>
        `).join('')
      }
    </div>
    <div class="card">
      <div class="secao-tit">Próximos eventos da agenda</div>
      ${eventos.filter(e=>e.data>=hoje).slice(0,5).sort((a,b)=>a.data>b.data?1:-1).map(e=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div><b style="color:#2e1065">${e.titulo}</b><br><small style="color:#6b7280">${fmtData(e.data)}${e.hora?' às '+e.hora:''}</small></div>
          <span class="pill azul">${e.tipo||'Evento'}</span>
        </div>
      `).join('') || '<div class="vazio">Nenhum evento futuro.</div>'}
    </div>
  `;
}

// ============================================================
// EMPRESAS
// ============================================================
function paginaEmpresas(c){
  const emps = DB.get('empresas');
  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Empresas</div><div class="pag-sub">${emps.length} de até 10 expositores cadastrados</div></div>
      <button class="btn" id="nova-emp" onclick="modalNovaEmpresa()"><i class="fa-solid fa-plus"></i> Nova empresa</button>
    </div>
    <div class="search-bar">
      <input type="text" id="filtro-emp" placeholder="Buscar por nome, CNPJ ou setor..." oninput="filtrarEmpresas()" style="max-width:400px">
    </div>
    <div id="lista-empresas">
      ${renderListaEmpresas(emps)}
    </div>
  `;
}

function renderListaEmpresas(emps){
  if(emps.length===0) return '<div class="card"><div class="vazio">Nenhuma empresa. Clique em <b>+ Nova empresa</b> para começar.</div></div>';
  return emps.map(e=>`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
            <b style="font-size:16px;color:#2e1065">${e.nomeFantasia||e.razaoSocial}</b>
            <span class="pill ${e.status==='ativo'?'ativo':e.status==='inativo'?'inativo':'pend'}">${e.status||'pendente'}</span>
          </div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>Razão Social:</b> ${e.razaoSocial||'—'}</div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>CNPJ:</b> ${e.cnpj||'—'} · <b>Setor:</b> ${e.setor||'—'}</div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>Responsável:</b> ${e.responsavel||'—'} · <b>E-mail:</b> ${e.email||'—'}</div>
          <div style="font-size:13px;color:#374151"><b>Tel:</b> ${e.telefone||'—'} · <b>Stand:</b> ${e.stand||'—'}</div>
          ${e.obs?'<div style="font-size:12px;color:#6b7280;margin-top:6px;background:#f5f3ff;padding:6px 10px;border-radius:8px">'+e.obs+'</div>':''}
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn-outline btn-sm" onclick="modalEditarEmpresa('${e.id}')"><i class="fa-solid fa-pen"></i> Editar</button>
          <button class="btn-perigo btn-sm" onclick="excluirEmpresa('${e.id}')"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  `).join('');
}

function filtrarEmpresas(){
  const q = (el('filtro-emp')||{}).value||'';
  const todos = DB.get('empresas');
  const filtrados = q ? todos.filter(e=>
    (e.nomeFantasia+e.razaoSocial+e.cnpj+e.setor+e.responsavel).toLowerCase().includes(q.toLowerCase())
  ) : todos;
  const lista = el('lista-empresas');
  if(lista) lista.innerHTML = renderListaEmpresas(filtrados);
}

function modalNovaEmpresa(id){
  const emp = id ? DB.find('empresas',id) : null;
  const titulo = emp ? 'Editar Empresa' : 'Nova Empresa';
  el('modal-host').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <h3><i class="fa-solid fa-building"></i> ${titulo}</h3>
        <div class="secao-tit">Dados da empresa</div>
        <div class="grid-2">
          <div class="campo"><label>Razão Social *</label><input id="e-razao" value="${emp?emp.razaoSocial||'':''}" required></div>
          <div class="campo"><label>Nome Fantasia</label><input id="e-fantasia" value="${emp?emp.nomeFantasia||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>CNPJ</label><input id="e-cnpj" placeholder="00.000.000/0001-00" value="${emp?emp.cnpj||'':''}"></div>
          <div class="campo"><label>Setor / Segmento</label><input id="e-setor" value="${emp?emp.setor||'':''}"></div>
        </div>
        <div class="secao-tit">Contato</div>
        <div class="grid-2">
          <div class="campo"><label>Responsável *</label><input id="e-resp" value="${emp?emp.responsavel||'':''}"></div>
          <div class="campo"><label>Cargo</label><input id="e-cargo" value="${emp?emp.cargo||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>E-mail</label><input id="e-email" type="email" value="${emp?emp.email||'':''}"></div>
          <div class="campo"><label>Telefone</label><input id="e-tel" placeholder="(00) 00000-0000" value="${emp?emp.telefone||'':''}"></div>
        </div>
        <div class="secao-tit">Participação</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Stand / Estande</label><input id="e-stand" value="${emp?emp.stand||'':''}"></div>
          <div class="campo"><label>Status</label>
            <select id="e-status">
              <option value="pendente" ${(!emp||emp.status==='pendente')?'selected':''}>Pendente</option>
              <option value="ativo" ${emp&&emp.status==='ativo'?'selected':''}>Ativo</option>
              <option value="inativo" ${emp&&emp.status==='inativo'?'selected':''}>Inativo</option>
            </select>
          </div>
        </div>
        <div class="campo"><label>Observações</label><textarea id="e-obs" rows="3">${emp?emp.obs||'':''}</textarea></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarEmpresa('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
  `;
}

function modalEditarEmpresa(id){ modalNovaEmpresa(id); }

function salvarEmpresa(id){
  const razao = el('e-razao').value.trim();
  if(!razao){ alert('Razão Social é obrigatória.'); return; }
  const dados = {
    razaoSocial: razao,
    nomeFantasia: el('e-fantasia').value.trim(),
    cnpj: el('e-cnpj').value.trim(),
    setor: el('e-setor').value.trim(),
    responsavel: el('e-resp').value.trim(),
    cargo: el('e-cargo').value.trim(),
    email: el('e-email').value.trim(),
    telefone: el('e-tel').value.trim(),
    stand: el('e-stand').value.trim(),
    status: el('e-status').value,
    obs: el('e-obs').value.trim(),
  };
  if(id){ DB.update('empresas',id,dados); }
  else { DB.add('empresas',dados); }
  fecharModal();
  paginaEmpresas(el('conteudo'));
}

function excluirEmpresa(id){
  if(!confirm('Excluir esta empresa?')) return;
  DB.remove('empresas',id);
  paginaEmpresas(el('conteudo'));
}

function fecharModal(){ el('modal-host').innerHTML=''; }
</script>
<script>
// ============================================================
// CONTRATOS
// ============================================================
function paginaContratos(c){
  const emps = DB.get('empresas');
  const contratos = DB.get('contratos');
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  function statusC(ct){
    if(ct.status==='cancelado') return {txt:'Cancelado',cls:'inativo'};
    if(ct.status==='assinado')  return {txt:'Assinado', cls:'ativo'};
    if(ct.dataVencimento){
      const v=new Date(ct.dataVencimento+'T00:00:00');
      if(v<hoje) return {txt:'Vencido',cls:'inativo'};
    }
    return {txt:'Pendente',cls:'pend'};
  }

  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Contratos</div><div class="pag-sub">${contratos.length} contrato(s) cadastrado(s)</div></div>
      <button class="btn" onclick="modalNovoContrato()"><i class="fa-solid fa-plus"></i> Novo contrato</button>
    </div>
    <div class="search-bar">
      <input type="text" id="filtro-ct" placeholder="Buscar por empresa ou número..." oninput="filtrarContratos()">
      <select id="filtro-ct-status" onchange="filtrarContratos()" style="padding:9px 14px;border:1.5px solid #e5e1f5;border-radius:10px;font-size:13.5px;background:#fdfcff;font-family:'Inter',sans-serif;color:#1f2937">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="assinado">Assinado</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div id="lista-contratos">${renderContratos(contratos, emps)}</div>
  `;
}

function renderContratos(contratos, emps){
  if(!emps) emps = DB.get('empresas');
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  if(contratos.length===0) return '<div class="card"><div class="vazio">Nenhum contrato cadastrado. Clique em <b>+ Novo contrato</b> para começar.</div></div>';

  function statusC(ct){
    if(ct.status==='cancelado') return {txt:'Cancelado',cls:'inativo'};
    if(ct.status==='assinado')  return {txt:'Assinado', cls:'ativo'};
    if(ct.dataVencimento){
      const v=new Date(ct.dataVencimento+'T00:00:00');
      if(v<hoje) return {txt:'Vencido',cls:'inativo'};
    }
    return {txt:'Pendente',cls:'pend'};
  }

  return contratos.map(ct=>{
    const emp = emps.find(e=>e.id===ct.empresaId);
    const st = statusC(ct);
    return `
      <div class="contrato-card">
        <div class="contrato-header">
          <div>
            <div class="contrato-empresa">${emp?emp.nomeFantasia||emp.razaoSocial:'Empresa não vinculada'}</div>
            <div class="contrato-meta">Nº ${ct.numero||'—'} · Valor: ${ct.valor?'R$ '+ct.valor:'—'} · Venc.: ${ct.dataVencimento?fmtData(ct.dataVencimento):'—'}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="pill ${st.cls}">${st.txt}</span>
            <button class="btn-outline btn-sm" onclick="modalEditarContrato('${ct.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-perigo btn-sm" onclick="excluirContrato('${ct.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
        <div class="contrato-tags">
          ${ct.tipoServico?'<span class="pill azul">'+ct.tipoServico+'</span>':''}
          ${ct.stand?'<span class="pill pend">Stand '+ct.stand+'</span>':''}
          ${ct.area?'<span class="pill pend">'+ct.area+'m²</span>':''}
        </div>
        ${ct.obs?'<div style="font-size:12px;color:#6b7280;margin-top:8px;background:#f5f3ff;padding:6px 10px;border-radius:8px">'+ct.obs+'</div>':''}
      </div>
    `;
  }).join('');
}

function filtrarContratos(){
  const q = (el('filtro-ct')||{}).value||'';
  const st = (el('filtro-ct-status')||{}).value||'';
  const emps = DB.get('empresas');
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  let cts = DB.get('contratos');
  if(q) cts = cts.filter(c=>{
    const emp = emps.find(e=>e.id===c.empresaId);
    return ((emp?emp.nomeFantasia+emp.razaoSocial:'')+c.numero).toLowerCase().includes(q.toLowerCase());
  });
  if(st) cts = cts.filter(c=>c.status===st);
  const lista = el('lista-contratos');
  if(lista) lista.innerHTML = renderContratos(cts, emps);
}

function modalNovoContrato(id){
  const ct = id ? DB.find('contratos',id) : null;
  const emps = DB.get('empresas');
  const titulo = ct ? 'Editar Contrato' : 'Novo Contrato';
  el('modal-host').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <h3><i class="fa-solid fa-file-contract"></i> ${titulo}</h3>
        <div class="secao-tit">Identificação</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Contrato</label><input id="ct-num" value="${ct?ct.numero||'':''}"></div>
          <div class="campo"><label>Empresa *</label>
            <select id="ct-emp">
              <option value="">Selecione...</option>
              ${emps.map(e=>`<option value="${e.id}" ${ct&&ct.empresaId===e.id?'selected':''}>${e.nomeFantasia||e.razaoSocial}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>Tipo de serviço</label><input id="ct-tipo" placeholder="Ex: Estande Padrão" value="${ct?ct.tipoServico||'':''}"></div>
          <div class="campo"><label>Status</label>
            <select id="ct-status">
              <option value="pendente" ${(!ct||ct.status==='pendente')?'selected':''}>Pendente</option>
              <option value="assinado" ${ct&&ct.status==='assinado'?'selected':''}>Assinado</option>
              <option value="cancelado" ${ct&&ct.status==='cancelado'?'selected':''}>Cancelado</option>
            </select>
          </div>
        </div>
        <div class="secao-tit">Valores e prazo</div>
        <div class="grid-2">
          <div class="campo"><label>Valor (R$)</label><input id="ct-valor" type="text" placeholder="0,00" value="${ct?ct.valor||'':''}"></div>
          <div class="campo"><label>Data de vencimento</label><input id="ct-venc" type="date" value="${ct?ct.dataVencimento||'':''}"></div>
        </div>
        <div class="secao-tit">Estande</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Stand</label><input id="ct-stand" value="${ct?ct.stand||'':''}"></div>
          <div class="campo"><label>Área (m²)</label><input id="ct-area" type="number" placeholder="0" value="${ct?ct.area||'':''}"></div>
        </div>
        <div class="campo"><label>Observações</label><textarea id="ct-obs" rows="3">${ct?ct.obs||'':''}</textarea></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarContrato('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
  `;
}

function modalEditarContrato(id){ modalNovoContrato(id); }

function salvarContrato(id){
  const empId = el('ct-emp').value;
  if(!empId){ alert('Selecione a empresa.'); return; }
  const dados = {
    empresaId: empId,
    numero: el('ct-num').value.trim(),
    tipoServico: el('ct-tipo').value.trim(),
    status: el('ct-status').value,
    valor: el('ct-valor').value.trim(),
    dataVencimento: el('ct-venc').value,
    stand: el('ct-stand').value.trim(),
    area: el('ct-area').value.trim(),
    obs: el('ct-obs').value.trim(),
  };
  if(id){ DB.update('contratos',id,dados); }
  else { DB.add('contratos',dados); }
  fecharModal();
  paginaContratos(el('conteudo'));
}

function excluirContrato(id){
  if(!confirm('Excluir este contrato?')) return;
  DB.remove('contratos',id);
  paginaContratos(el('conteudo'));
}
</script>
<script>
// ============================================================
// AGENDA COM NOTIFICAÇÕES
// ============================================================
let _agendaMes = new Date().getMonth();
let _agendaAno = new Date().getFullYear();

function paginaAgenda(c){
  solicitarPermissaoNotificacao();
  renderAgenda(c);
}

function solicitarPermissaoNotificacao(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function renderAgenda(c){
  const hoje = new Date().toISOString().split('T')[0];
  const eventos = DB.get('agenda').sort((a,b)=>a.data>b.data?1:-1);
  const nomeMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][_agendaMes];
  
  // Build calendar
  const primeiroDia = new Date(_agendaAno, _agendaMes, 1);
  const ultimoDia   = new Date(_agendaAno, _agendaMes+1, 0);
  const diasNoMes   = ultimoDia.getDate();
  const inicioSemana = primeiroDia.getDay(); // 0=dom

  let calHtml = '<div class="agenda-cal">';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{
    calHtml += `<div class="cal-dia-nome">${d}</div>`;
  });
  
  for(let i=0;i<inicioSemana;i++) calHtml += '<div></div>';
  
  for(let d=1;d<=diasNoMes;d++){
    const dateStr = `${_agendaAno}-${String(_agendaMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evsDia = eventos.filter(e=>e.data===dateStr);
    const isHoje = dateStr===hoje;
    calHtml += `<div class="cal-dia${isHoje?' hoje':''}" onclick="modalNovoEvento(null,'${dateStr}')">
      <div class="dia-num">${d}</div>
      ${evsDia.slice(0,2).map(e=>`<div class="cal-evento ${e.cor||''}" title="${e.titulo}">${e.titulo}</div>`).join('')}
      ${evsDia.length>2?`<div style="font-size:9px;color:#6b7280">+${evsDia.length-2}</div>`:''}
    </div>`;
  }
  calHtml += '</div>';

  // Events list
  const evFuturos = eventos.filter(e=>e.data>=hoje);
  const evPassados = eventos.filter(e=>e.data<hoje);

  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Agenda</div><div class="pag-sub">${eventos.length} evento(s) cadastrado(s)</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn-outline" onclick="notificarEventosHoje()"><i class="fa-solid fa-bell"></i> Notificar hoje</button>
        <button class="btn" onclick="modalNovoEvento()"><i class="fa-solid fa-plus"></i> Novo evento</button>
      </div>
    </div>

    ${'Notification' in window && Notification.permission!=='granted' && Notification.permission!=='denied'
      ? '<div class="alerta info"><i class="fa-solid fa-bell"></i> Ative as notificações para receber lembretes de eventos.</div>'
      : ''}
    ${Notification.permission==='denied'
      ? '<div class="alerta erro"><i class="fa-solid fa-bell-slash"></i> Notificações bloqueadas. Ative nas configurações do navegador.</div>'
      : ''}
    ${Notification.permission==='granted'
      ? '<div class="alerta ok"><i class="fa-solid fa-bell"></i> Notificações ativadas! Você receberá lembretes dos eventos.</div>'
      : ''}

    <div class="card">
      <div class="cal-nav">
        <button class="btn-outline btn-sm" onclick="mudMes(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <h4>${nomeMes} ${_agendaAno}</h4>
        <button class="btn-outline btn-sm" onclick="mudMes(1)"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      ${calHtml}
    </div>

    <div class="card">
      <div class="secao-tit">Próximos eventos (${evFuturos.length})</div>
      ${evFuturos.length===0

        <div class="card" style="margin-top:8px">
          <div class="lista-eventos">
            ${evPassados.reverse().map(e=>renderEvento(e,true)).join('')}

function renderEvento(e, passado=false){
  return `
    <div class="evento-item ${passado?'concluido':''}">
      <div class="evento-data">${fmtData(e.data)}${e.hora?'<br>'+e.hora:''}</div>
      <div style="flex:1">
        <div class="evento-titulo">${e.titulo}</div>
        ${e.local?'<div class="evento-desc"><i class="fa-solid fa-location-dot"></i> '+e.local+'</div>':''}
        ${e.desc?'<div class="evento-desc">'+e.desc+'</div>':''}
        ${e.tipo?'<span class="pill azul" style="margin-top:4px">'+e.tipo+'</span>':''}
      </div>
      <div class="evento-acoes">
        <button class="btn-outline btn-sm" onclick="modalNovoEvento('${e.id}')"><i class="fa-solid fa-pen"></i></button>
        <button class="btn-perigo btn-sm" onclick="excluirEvento('${e.id}')"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  `;
}

function mudMes(dir){
  _agendaMes += dir;
  if(_agendaMes<0){ _agendaMes=11; _agendaAno--; }
  if(_agendaMes>11){ _agendaMes=0; _agendaAno++; }
  renderAgenda(el('conteudo'));
}

        <h3><i class="fa-solid fa-calendar-plus"></i> ${titulo}</h3>
        <div class="campo"><label>Título do evento *</label><input id="ev-tit" placeholder="Ex: Reunião de expositores" value="${ev?ev.titulo||'':''}"></div>
        <div class="grid-2">
          <div class="campo"><label>Data *</label><input id="ev-data" type="date" value="${ev?ev.data||'':dataPreenchida||''}"></div>
          <div class="campo"><label>Horário</label><input id="ev-hora" type="time" value="${ev?ev.hora||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>Tipo</label>
            <select id="ev-tipo">
              <option value="">Selecione...</option>
              ${['Reunião','Prazo','Entrega','Instalação','Visita','Evento','Outro'].map(t=>`<option value="${t}" ${ev&&ev.tipo===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="campo"><label>Cor</label>
            <select id="ev-cor">
              <option value="" ${!ev||!ev.cor?'selected':''}>Roxo (padrão)</option>
              <option value="vermelho" ${ev&&ev.cor==='vermelho'?'selected':''}>Vermelho (urgente)</option>
              <option value="verde" ${ev&&ev.cor==='verde'?'selected':''}>Verde (concluído)</option>
              <option value="amarelo" ${ev&&ev.cor==='amarelo'?'selected':''}>Amarelo (atenção)</option>
            </select>
          </div>
        </div>
        <div class="campo"><label>Local</label><input id="ev-local" placeholder="Sala, Pavilhão..." value="${ev?ev.local||'':''}"></div>
        <div class="campo"><label>Descrição / Observações</label><textarea id="ev-desc" rows="3">${ev?ev.desc||'':''}</textarea></div>
        <div class="campo" style="background:#f5f3ff;padding:12px;border-radius:10px">
          <label><i class="fa-solid fa-bell"></i> Lembrete (minutos antes)</label>
          <select id="ev-lembrete">
            <option value="">Sem lembrete</option>
            <option value="5" ${ev&&ev.lembrete==='5'?'selected':''}>5 minutos</option>
            <option value="15" ${ev&&ev.lembrete==='15'?'selected':''}>15 minutos</option>
            <option value="30" ${ev&&ev.lembrete==='30'?'selected':''}>30 minutos</option>
            <option value="60" ${ev&&ev.lembrete==='60'?'selected':''}>1 hora</option>
            <option value="1440" ${ev&&ev.lembrete==='1440'?'selected':''}>1 dia antes</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarEvento('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
  `;
}

function salvarEvento(id){
  const titulo = el('ev-tit').value.trim();
  const data   = el('ev-data').value;
  if(!titulo||!data){ alert('Título e data são obrigatórios.'); return; }
  const dados = {
    titulo, data,
    hora: el('ev-hora').value,
    tipo: el('ev-tipo').value,
    cor: el('ev-cor').value,
    local: el('ev-local').value.trim(),
    desc: el('ev-desc').value.trim(),
    lembrete: el('ev-lembrete').value,
  };
  if(id){ DB.update('agenda',id,dados); }
  else { DB.add('agenda',dados); }
  fecharModal();
  renderAgenda(el('conteudo'));
}

function excluirEvento(id){
  if(!confirm('Excluir este evento?')) return;
  DB.remove('agenda',id);
  renderAgenda(el('conteudo'));
}

// NOTIFICAÇÕES
function agendarNotificacoes(){
  // Check every minute for events needing notification
  setInterval(verificarLembretes, 60000);
  verificarLembretes();
}

function verificarLembretes(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const agora = new Date();
  const eventos = DB.get('agenda');
  eventos.forEach(ev=>{
    if(!ev.data||!ev.hora||!ev.lembrete) return;
    const evDate = new Date(ev.data+'T'+ev.hora);
    const diff = (evDate - agora) / 60000; // diff in minutes
    const lem  = parseInt(ev.lembrete);
    if(diff>0 && diff<=lem+1 && diff>=lem-1){
      const notifKey = 'notif_'+ev.id+'_'+ev.lembrete;
      if(!sessionStorage.getItem(notifKey)){
        sessionStorage.setItem(notifKey,'1');
        new Notification('📅 Lembrete: ' + ev.titulo, {
          body: fmtData(ev.data) + (ev.hora?' às '+ev.hora:'') + (ev.local?' — '+ev.local:''),
          icon: 'https://danielmaullins.github.io/terminalinovacao/icon.png',
        });
      }
    }
  });
}

function notificarEventosHoje(){
  if(!('Notification' in window)){ alert('Notificações não suportadas.'); return; }
  if(Notification.permission==='denied'){ alert('Notificações bloqueadas. Ative nas configurações do navegador.'); return; }
  Notification.requestPermission().then(p=>{
    if(p!=='granted') return;
    const hoje = new Date().toISOString().split('T')[0];
    const evHoje = DB.get('agenda').filter(e=>e.data===hoje);
    if(evHoje.length===0){
      new Notification('📅 Terminal Inovação', {body:'Nenhum evento para hoje.'});
    } else {
      evHoje.forEach(ev=>{
        new Notification('📅 Hoje: ' + ev.titulo, {
          body: (ev.hora?'às '+ev.hora:'') + (ev.local?' — '+ev.local:'') + (ev.desc?' | '+ev.desc:''),
        });
      });
    }
  });
}

function toggleCheck(col,id){

// ============================================================
// HELPERS
// ============================================================
function fmtData(iso){
  if(!iso) return '—';
  try{
    const d = iso.includes('T') ? new Date(iso) : new Date(iso+'T00:00:00');
    return d.toLocaleDateString('pt-BR');
  }catch(e){ return iso; }
}

function fmtDataHora(iso){
  if(!iso) return '—';
  try{ return new Date(iso).toLocaleString('pt-BR'); }
  catch(e){ return iso; }
}

    --branco:#ffffff;--sombra:0 4px 24px rgba(76,29,149,.10),0 1px 4px rgba(76,29,149,.06);
    --sombra-hover:0 8px 32px rgba(76,29,149,.18),0 2px 8px rgba(76,29,149,.1);--raio:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;letter-spacing:-0.01em;background:#f7f4fe;color:#1f2937;min-height:100vh;}
  a{color:#6d28d9;text-decoration:none}
  button{font-family:'Inter',system-ui,sans-serif;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;transition:.2s;letter-spacing:-0.01em}
  .btn{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;padding:10px 20px;box-shadow:0 4px 12px rgba(109,40,217,.3)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(109,40,217,.4)}
  .btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);padding:8px 16px}
  .btn-ghost:hover{background:rgba(255,255,255,.15)}
  .btn-sm{padding:6px 14px;font-size:13px}
  .btn-outline{background:transparent;color:#6d28d9;border:1.5px solid #6d28d9;padding:8px 16px}
  .btn-outline:hover{background:#f5f3ff}
  .btn-perigo{background:#dc2626;color:#fff;padding:8px 16px}
  .btn-perigo:hover{background:#b91c1c}
  /* TOPO */
  .topo{background:linear-gradient(135deg,#3a0f8a 0%,#6d28d9 60%,#7c3aed 100%);color:#fff;padding:0 28px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(46,16,101,.3)}
  .topo img{height:36px;filter:brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,.2));opacity:.9}
  .topo h2{font-size:17px;font-weight:700;letter-spacing:-0.02em}
  .topo .sub{font-size:11px;opacity:.75;letter-spacing:0.1px}
  .topo .spacer{flex:1}
  .topo .user{font-size:13px;text-align:right}
  .topo .user b{display:block}
  .topo .badge{display:inline-block;font-size:10.5px;font-weight:500;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:2px 9px;border-radius:20px;margin-top:2px}
  .topo .mark{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;border:1.5px solid rgba(255,255,255,.3);backdrop-filter:blur(4px)}
  /* LAYOUT */
  .layout{display:flex;max-width:1280px;margin:0 auto;gap:20px;padding:24px 28px}
  /* MENU */
  .menu{width:230px;flex-shrink:0;background:#fff;border-radius:16px;padding:12px 10px;box-shadow:var(--sombra);height:fit-content;border:1px solid rgba(139,92,246,.07);position:sticky;top:80px}
  .menu button{width:100%;text-align:left;background:transparent;color:#374151;padding:11px 14px;border-radius:12px;display:flex;align-items:center;gap:10px;margin-bottom:2px;font-weight:500;font-size:13.5px;letter-spacing:-0.01em}
  .menu button:hover{background:#f5f3ff;color:#5b21b6}
  .menu button.ativo{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;box-shadow:0 4px 12px rgba(109,40,217,.35)}
  .menu .ico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
  /* CONTEUDO */
  #conteudo{flex:1;min-width:0}
  .card{background:#fff;border-radius:var(--raio);padding:22px;box-shadow:var(--sombra);margin-bottom:16px;border:1px solid rgba(139,92,246,.06)}
  .card:hover{box-shadow:var(--sombra-hover)}
  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:#fff;border-radius:var(--raio);padding:18px 20px;box-shadow:var(--sombra);border-top:3px solid #8b5cf6;cursor:default;transition:.2s}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--sombra-hover)}
  .stat .n{font-size:28px;font-weight:800;color:#5b21b6;letter-spacing:-0.03em}
  .stat .l{font-size:11px;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
  /* TOOLBAR */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .pag-titulo{font-size:20px;font-weight:800;color:#2e1065;letter-spacing:-0.02em}
  .pag-sub{font-size:13px;color:#6b7280;margin-top:2px}
  .vazio{text-align:center;color:#6b7280;padding:40px 20px;font-size:14px}
  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(46,16,101,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:28px}
  .modal h3{color:#4c1d95;margin-bottom:18px;font-size:18px;font-weight:700}
  /* FORMS */
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
  .campo input,.campo select,.campo textarea{width:100%;padding:10px 13px;border:1.5px solid #e5e1f5;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:#fdfcff;transition:.2s;color:#1f2937}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
  .campo textarea{resize:vertical;min-height:80px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  /* PILLS */
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.pend{background:#fef9c3;color:#ca8a04}
  .pill.ativo{background:#dcfce7;color:#16a34a}
  .pill.inativo{background:#fee2e2;color:#dc2626}
  .pill.azul{background:#dbeafe;color:#1d4ed8}
  /* TABELA */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:2px solid #ede9fe}
  td{padding:12px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
  tr:hover td{background:#f5f3ff}
  /* ALERTA */
  .alerta{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;font-weight:600}
  .alerta.erro{background:#fee2e2;color:#dc2626}
  .alerta.ok{background:#dcfce7;color:#16a34a}
  .alerta.info{background:#ede9fe;color:#5b21b6}
  /* SECOES */
  .secao-tit{font-size:12px;font-weight:800;color:#6d28d9;text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;border-bottom:2px solid #ede9fe;padding-bottom:6px}
  /* AGENDA */
  .agenda-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
  .cal-dia-nome{text-align:center;font-size:11px;font-weight:700;color:#6b7280;padding:6px 0;text-transform:uppercase}
  .cal-dia{min-height:80px;border-radius:10px;background:#f5f3ff;padding:6px;cursor:pointer;transition:.15s;border:2px solid transparent;font-size:12px}
  .cal-dia:hover{background:#ede9fe;border-color:#c4b5fd}
  .cal-dia.hoje{border-color:#7c3aed;background:#ede9fe}
  .cal-dia.outro-mes{opacity:.4}
  .cal-dia .dia-num{font-weight:700;font-size:13px;color:#374151;margin-bottom:2px}
  .cal-dia.hoje .dia-num{color:#5b21b6}
  .cal-evento{font-size:10px;background:#7c3aed;color:#fff;border-radius:4px;padding:1px 5px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .cal-evento.vermelho{background:#dc2626}
  .cal-evento.verde{background:#16a34a}
  .cal-evento.amarelo{background:#ca8a04}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-nav h4{font-size:16px;font-weight:700;color:#2e1065}
  .lista-eventos{display:flex;flex-direction:column;gap:10px}
  .evento-item{display:flex;gap:12px;align-items:flex-start;background:#f5f3ff;border-radius:10px;padding:12px 14px;border-left:4px solid #7c3aed}
  .evento-item.urgente{border-left-color:#dc2626;background:#fff5f5}
  .evento-item.concluido{border-left-color:#16a34a;background:#f0fdf4;opacity:.7}
  .evento-data{font-size:11px;font-weight:700;color:#6b7280;white-space:nowrap;min-width:80px}
  .evento-titulo{font-size:14px;font-weight:600;color:#1f2937}
  .evento-desc{font-size:12px;color:#6b7280;margin-top:2px}
  .evento-acoes{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
  /* CONTRATOS */
  .contrato-card{background:#fff;border-radius:12px;border:1px solid #ede9fe;padding:16px;margin-bottom:12px;transition:.2s}
  .contrato-card:hover{box-shadow:var(--sombra-hover)}
  .contrato-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .contrato-empresa{font-size:15px;font-weight:700;color:#2e1065}
  .contrato-meta{font-size:12px;color:#6b7280;margin-top:2px}
  .contrato-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  /* LOGIN */
  .login-wrap{min-height:100vh;background:linear-gradient(135deg,#3a0f8a,#6d28d9 50%,#7c3aed);display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:#fff;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(46,16,101,.3)}
  .login-logo{text-align:center;margin-bottom:24px}
  .login-logo .mark{width:56px;height:56px;background:linear-gradient(135deg,#6d28d9,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(109,40,217,.35);color:#fff;font-size:24px}
  .login-logo h1{font-size:17px;font-weight:800;color:#2e1065;letter-spacing:-0.02em}
  .login-logo p{font-size:12px;color:#6b7280;margin-top:3px}
  .tab-bar{display:flex;background:#f5f3ff;border-radius:10px;padding:3px;margin-bottom:20px;gap:3px}
  .tab-btn{flex:1;background:transparent;color:#6b7280;padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none}
  .tab-btn.ativo{background:#fff;color:#5b21b6;box-shadow:0 2px 8px rgba(109,40,217,.12)}
  #msg-login{margin-bottom:12px}
  /* CHECKLIST */
  .check-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;transition:.15s;cursor:pointer}
  .check-item:hover{background:#f5f3ff}
  .check-item input[type=checkbox]{width:18px;height:18px;accent-color:#6d28d9;cursor:pointer}
  .check-item.done span{text-decoration:line-through;color:#6b7280}
  /* SEARCH BAR */
  .search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search-bar input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid #e5e1f5;border-radius:10px;font-size:13.5px;background:#fdfcff;font-family:'Inter',sans-serif}
  .search-bar input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
  /* NOTIF BADGE */
  .notif-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;background:#dc2626;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:0 5px;margin-left:4px}
  </style>
</head>
<body>
<!-- LOGIN -->
<div id="tela-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="mark"><i class="fa-solid fa-train-subway"></i></div>
      <h1>Terminal Inovação</h1>
      <p>Intermodal 2027 — Gestão de Expositores</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ativo" id="tab-entrar" onclick="trocarTab('entrar')">Entrar</button>
      <button class="tab-btn" id="tab-criar" onclick="trocarTab('criar')">Criar conta</button>
    </div>
    <div id="msg-login"></div>
    <form id="form-entrar" onsubmit="entrar(event)">
      <div class="campo"><label>E-mail</label><input id="login-email" type="email" placeholder="seu@email.com" required></div>
      <div class="campo"><label>Senha</label><input id="login-senha" type="password" placeholder="••••••••" required></div>
      <button class="btn" style="width:100%;margin-top:8px;padding:12px" type="submit">Entrar</button>
      <p style="text-align:center;margin-top:12px;font-size:13px;color:#6b7280"><a href="#" onclick="recuperarSenha(event)">Esqueceu a senha?</a></p>
    </form>
    <form id="form-criar" style="display:none" onsubmit="criarConta(event)">
      <div class="campo"><label>Nome completo</label><input id="novo-nome" type="text" placeholder="Nome completo" required></div>
      <div class="campo"><label>E-mail</label><input id="novo-email" type="email" placeholder="seu@email.com" required></div>
      <div class="campo"><label>Senha</label><input id="novo-senha" type="password" placeholder="••••••••" minlength="6" required></div>
      <button class="btn" style="width:100%;margin-top:8px;padding:12px" type="submit">Criar conta</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="topo">
    <div class="mark"><i class="fa-solid fa-train-subway"></i></div>
    <div>
      <div class="topo h2" style="font-size:17px;font-weight:700;letter-spacing:-0.02em">Terminal Inovação</div>
      <div class="sub">Intermodal 2027</div>
    </div>
    <div class="spacer"></div>
    <div class="user"><b id="u-nome">—</b><span class="badge" id="u-papel">—</span></div>
    <button class="btn-ghost btn-sm" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
  </header>
  <div class="layout">
    <nav class="menu" id="menu"></nav>
    <main id="conteudo"></main>
  </div>
</div>
<div id="modal-host"></div>

<script>
// ============================================================
// STORAGE HELPERS
// ============================================================
const DB = {
  get(col){ try{ return JSON.parse(localStorage.getItem('ti_'+col)||'[]'); }catch(e){return[];} },
  set(col,data){ localStorage.setItem('ti_'+col, JSON.stringify(data)); },
  add(col,item){ const d=DB.get(col); item.id=item.id||Date.now().toString(36)+Math.random().toString(36).slice(2); item.criadoEm=new Date().toISOString(); d.push(item); DB.set(col,d); return item; },
  update(col,id,patch){ const d=DB.get(col); const i=d.findIndex(x=>x.id===id); if(i>=0){d[i]={...d[i],...patch,atualizadoEm:new Date().toISOString()};DB.set(col,d);return d[i];} return null; },
  remove(col,id){ DB.set(col, DB.get(col).filter(x=>x.id!==id)); },
  find(col,id){ return DB.get(col).find(x=>x.id===id)||null; }
};

// ============================================================
// AUTH (localStorage-based)
// ============================================================
const USUARIOS_KEY = 'ti_usuarios';
const SESSAO_KEY   = 'ti_sessao';
let USER = null;
let PAGINA = 'dash';

function getUsuarios(){ try{return JSON.parse(localStorage.getItem(USUARIOS_KEY)||'[]');}catch(e){return[];} }
function salvarUsuarios(u){ localStorage.setItem(USUARIOS_KEY, JSON.stringify(u)); }

function iniciarApp(){
  const sess = localStorage.getItem(SESSAO_KEY);
  if(sess){
    try{
      USER = JSON.parse(sess);
      mostrarApp();
    }catch(e){ mostrarLogin(); }
  } else {
    mostrarLogin();
  }
  agendarNotificacoes();
}

function mostrarLogin(){
  document.getElementById('tela-login').style.display='flex';
  document.getElementById('app').style.display='none';
}
function mostrarApp(){
  document.getElementById('tela-login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('u-nome').textContent = USER.nome;
  document.getElementById('u-papel').textContent = USER.papel==='admin' ? 'Organização (Admin)' : 'Expositor';
  montarMenu();
  render();
}

function trocarTab(t){
  document.getElementById('form-entrar').style.display = t==='entrar'?'block':'none';
  document.getElementById('form-criar').style.display  = t==='criar'?'block':'none';
  document.getElementById('tab-entrar').classList.toggle('ativo',t==='entrar');
  document.getElementById('tab-criar').classList.toggle('ativo',t==='criar');
  document.getElementById('msg-login').innerHTML='';
}

function entrar(e){
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const senha  = document.getElementById('login-senha').value;
  const users  = getUsuarios();
  let u = users.find(x=>x.email===email && x.senha===senha);
  // Auto-create admin if first login
  if(!u && email && senha.length>=6){
    const isFirst = users.length===0;
    if(isFirst){
      u = {id:'adm1',nome:'Administrador',email,senha,papel:'admin',criadoEm:new Date().toISOString()};
      users.push(u); salvarUsuarios(users);
    }
  }
  if(!u){ msgLogin('E-mail ou senha inválidos.','erro'); return; }
  USER = u;
  localStorage.setItem(SESSAO_KEY, JSON.stringify(u));
  mostrarApp();
}

function criarConta(e){
  e.preventDefault();
  const nome  = document.getElementById('novo-nome').value.trim();
  const email = document.getElementById('novo-email').value.trim().toLowerCase();
  const senha = document.getElementById('novo-senha').value;
  const users = getUsuarios();
  if(users.find(x=>x.email===email)){ msgLogin('Este e-mail já está cadastrado.','erro'); return; }
  const u = {id:Date.now().toString(36),nome,email,senha,papel:'expositor',criadoEm:new Date().toISOString()};
  users.push(u); salvarUsuarios(users);
  USER = u;
  localStorage.setItem(SESSAO_KEY, JSON.stringify(u));
  mostrarApp();
}

function sair(){
  localStorage.removeItem(SESSAO_KEY);
  USER = null;
  mostrarLogin();
}

function recuperarSenha(e){
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  if(!email){ msgLogin('Digite seu e-mail no campo acima.','info'); return; }
  const users = getUsuarios();
  const u = users.find(x=>x.email===email);
  if(u){ msgLogin('Sua senha é: ' + u.senha,'ok'); }
  else { msgLogin('E-mail não encontrado.','erro'); }
}

function msgLogin(txt,tipo){
  document.getElementById('msg-login').innerHTML = `<div class="alerta ${tipo}">${txt}</div>`;
}

// ============================================================
// MENU
// ============================================================
function montarMenu(){
  const itens = USER.papel==='admin' ? [
    {id:'dash',       ico:'<i class="fa-solid fa-chart-pie"></i>',       txt:'Painel geral'},
    {id:'empresas',   ico:'<i class="fa-solid fa-building"></i>',         txt:'Empresas'},
    {id:'contratos',  ico:'<i class="fa-solid fa-file-contract"></i>',    txt:'Contratos'},
    {id:'agenda',     ico:'<i class="fa-solid fa-calendar-days"></i>',    txt:'Agenda'},
    {id:'avisos',     ico:'<i class="fa-solid fa-bell"></i>',             txt:'Avisos'},
    {id:'divulgacao', ico:'<i class="fa-solid fa-bullhorn"></i>',         txt:'Divulgação'},
    {id:'usuarios',   ico:'<i class="fa-solid fa-users"></i>',            txt:'Usuários & convites'},
    {id:'checklist-admin',ico:'<i class="fa-solid fa-list-check"></i>',  txt:'Checklists'},
  ] : [
    {id:'minha-empresa',ico:'<i class="fa-solid fa-building"></i>',       txt:'Minha empresa'},
    {id:'meu-contrato', ico:'<i class="fa-solid fa-file-contract"></i>',  txt:'Meu contrato'},
    {id:'agenda',        ico:'<i class="fa-solid fa-calendar-days"></i>', txt:'Agenda'},
    {id:'avisos',        ico:'<i class="fa-solid fa-bell"></i>',          txt:'Avisos'},
    {id:'checklist',     ico:'<i class="fa-solid fa-list-check"></i>',    txt:'Checklist'},
  ];
  const nav = document.getElementById('menu');
  nav.innerHTML = itens.map(it=>`
    <button data-p="${it.id}" onclick="ir('${it.id}')" class="${PAGINA===it.id?'ativo':''}">
      <span class="ico">${it.ico}</span>${it.txt}
    </button>
  `).join('');
}

function ir(pag){
  PAGINA = pag;
  montarMenu();
  render();
}

function el(id){ return document.getElementById(id); }

// ============================================================
// RENDER
// ============================================================
function render(){
  const c = el('conteudo');
  c.innerHTML = '<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando…</div>';
  if(PAGINA==='dash')            return paginaDash(c);
  if(PAGINA==='empresas')        return paginaEmpresas(c);
  if(PAGINA==='contratos')       return paginaContratos(c);
  if(PAGINA==='agenda')          return paginaAgenda(c);
  if(PAGINA==='avisos')          return paginaAvisos(c);
  if(PAGINA==='divulgacao')      return paginaDivulgacao(c);
  if(PAGINA==='usuarios')        return paginaUsuarios(c);
  if(PAGINA==='checklist-admin') return paginaChecklist(c,'admin');
  if(PAGINA==='minha-empresa')   return paginaMinhaEmpresa(c);
  if(PAGINA==='meu-contrato')    return paginaMeuContrato(c);
  if(PAGINA==='checklist')       return paginaChecklist(c,'exp');
  c.innerHTML = '<div class="vazio">Página em construção.</div>';
}
</script>
<script>
// ============================================================
// PAINEL GERAL
// ============================================================

    <div class="stats">
      <div class="stat"><div class="n">${emps.length}</div><div class="l">Empresas</div></div>
      <div class="stat"><div class="n">${contratos.length}</div><div class="l">Contratos</div></div>
      <div class="stat"><div class="n">${contAtivos}</div><div class="l">Assinados</div></div>
      <div class="stat"><div class="n">${evHoje}</div><div class="l">Eventos hoje</div></div>
    </div>
    <div class="card">
      <div class="secao-tit">Últimas empresas cadastradas</div>
      ${emps.length===0

        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div><b style="color:#2e1065">${e.titulo}</b><br><small style="color:#6b7280">${fmtData(e.data)}${e.hora?' às '+e.hora:''}</small></div>
          <span class="pill azul">${e.tipo||'Evento'}</span>
        </div>
      `).join('') || '<div class="vazio">Nenhum evento futuro.</div>'}
    </div>
  `;
}

// ============================================================
// EMPRESAS
// ============================================================
function paginaEmpresas(c){
  const emps = DB.get('empresas');
  c.innerHTML = `
    <div class="toolbar">
      <div><div class="pag-titulo">Empresas</div><div class="pag-sub">${emps.length} de até 10 expositores cadastrados</div></div>
      <button class="btn" id="nova-emp" onclick="modalNovaEmpresa()"><i class="fa-solid fa-plus"></i> Nova empresa</button>
    </div>
    <div class="search-bar">
      <input type="text" id="filtro-emp" placeholder="Buscar por nome, CNPJ ou setor..." oninput="filtrarEmpresas()" style="max-width:400px">
    </div>
    <div id="lista-empresas">
      ${renderListaEmpresas(emps)}
    </div>
  `;
}

function renderListaEmpresas(emps){
  if(emps.length===0) return '<div class="card"><div class="vazio">Nenhuma empresa. Clique em <b>+ Nova empresa</b> para começar.</div></div>';
  return emps.map(e=>`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
            <b style="font-size:16px;color:#2e1065">${e.nomeFantasia||e.razaoSocial}</b>
            <span class="pill ${e.status==='ativo'?'ativo':e.status==='inativo'?'inativo':'pend'}">${e.status||'pendente'}</span>
          </div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>Razão Social:</b> ${e.razaoSocial||'—'}</div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>CNPJ:</b> ${e.cnpj||'—'} · <b>Setor:</b> ${e.setor||'—'}</div>
          <div style="font-size:13px;color:#374151;margin-bottom:2px"><b>Responsável:</b> ${e.responsavel||'—'} · <b>E-mail:</b> ${e.email||'—'}</div>
          <div style="font-size:13px;color:#374151"><b>Tel:</b> ${e.telefone||'—'} · <b>Stand:</b> ${e.stand||'—'}</div>
          ${e.obs?'<div style="font-size:12px;color:#6b7280;margin-top:6px;background:#f5f3ff;padding:6px 10px;border-radius:8px">'+e.obs+'</div>':''}
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn-outline btn-sm" onclick="modalEditarEmpresa('${e.id}')"><i class="fa-solid fa-pen"></i> Editar</button>
          <button class="btn-perigo btn-sm" onclick="excluirEmpresa('${e.id}')"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  `).join('');
}

function filtrarEmpresas(){
  const q = (el('filtro-emp')||{}).value||'';
  const todos = DB.get('empresas');
  const filtrados = q ? todos.filter(e=>
    (e.nomeFantasia+e.razaoSocial+e.cnpj+e.setor+e.responsavel).toLowerCase().includes(q.toLowerCase())
  ) : todos;
  const lista = el('lista-empresas');
  if(lista) lista.innerHTML = renderListaEmpresas(filtrados);
}

function modalNovaEmpresa(id){
  const emp = id ? DB.find('empresas',id) : null;
  const titulo = emp ? 'Editar Empresa' : 'Nova Empresa';
  el('modal-host').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <h3><i class="fa-solid fa-building"></i> ${titulo}</h3>
        <div class="secao-tit">Dados da empresa</div>
        <div class="grid-2">
          <div class="campo"><label>Razão Social *</label><input id="e-razao" value="${emp?emp.razaoSocial||'':''}" required></div>
          <div class="campo"><label>Nome Fantasia</label><input id="e-fantasia" value="${emp?emp.nomeFantasia||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>CNPJ</label><input id="e-cnpj" placeholder="00.000.000/0001-00" value="${emp?emp.cnpj||'':''}"></div>
          <div class="campo"><label>Setor / Segmento</label><input id="e-setor" value="${emp?emp.setor||'':''}"></div>
        </div>
        <div class="secao-tit">Contato</div>
        <div class="grid-2">
          <div class="campo"><label>Responsável *</label><input id="e-resp" value="${emp?emp.responsavel||'':''}"></div>
          <div class="campo"><label>Cargo</label><input id="e-cargo" value="${emp?emp.cargo||'':''}"></div>
        </div>
        <div class="grid-2">
          <div class="campo"><label>E-mail</label><input id="e-email" type="email" value="${emp?emp.email||'':''}"></div>
          <div class="campo"><label>Telefone</label><input id="e-tel" placeholder="(00) 00000-0000" value="${emp?emp.telefone||'':''}"></div>
        </div>
        <div class="secao-tit">Participação</div>
        <div class="grid-2">
          <div class="campo"><label>Nº Stand / Estande</label><input id="e-stand" value="${emp?emp.stand||'':''}"></div>
          <div class="campo"><label>Status</label>
            <select id="e-status">
              <option value="pendente" ${(!emp||emp.status==='pendente')?'selected':''}>Pendente</option>
              <option value="ativo" ${emp&&emp.status==='ativo'?'selected':''}>Ativo</option>
              <option value="inativo" ${emp&&emp.status==='inativo'?'selected':''}>Inativo</option>
            </select>
          </div>
        </div>
        <div class="campo"><label>Observações</label><textarea id="e-obs" rows="3">${emp?emp.obs||'':''}</textarea></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
          <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarEmpresa('${id||''}')"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
        </div>
      </div>
    </div>
